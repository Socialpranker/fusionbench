name: Build & deploy catalog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Ensure catalog data
        run: |
          shopt -s nullglob
          # Only catalog files — NOT runs/outputs.jsonl (raw per-task outputs for CI re-grade,
          # a different schema without task_type; the build glob below must not pick it up).
          files=(runs/catalog*.jsonl)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no committed catalog -> generating illustrative mock catalog"
            python scripts/run_v0.py --mock --limit 100 --out runs/catalog_demo.jsonl
          fi
      - run: python scripts/build_catalog.py --runs "runs/catalog*.jsonl" --out site/index.html
      - run: touch site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
